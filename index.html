<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>André Sousa - Produção Visual</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Georgia', serif;
  background: #0f0f0f;
  color: #f5f5f5;
}

/* NAVBAR */
.navbar {
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid rgba(212,175,119,0.2);
}

.nav-link {
  margin-left:20px;
  cursor:pointer;
  color:#999;
}

.nav-link:hover {
  color:#d4af77;
}

/* PAGES */
.page { display:none; }
.page.active { display:block; }

/* HERO */
.hero {
  text-align:center;
  padding:120px 20px;
}

.hero h1 {
  font-size:3rem;
}

/* GRID */
.portfolio-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.portfolio-item {
  cursor:pointer;
  overflow:hidden;
}

.portfolio-img {
  width:100%;
  height:300px;
  object-fit:cover;
  transition:0.4s;
}

.portfolio-item:hover img {
  transform:scale(1.1);
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
}

#modal img {
  max-width:90%;
}

/* BUTTON */
.btn {
  padding:12px 25px;
  border:1px solid #d4af77;
  color:#d4af77;
  margin-top:20px;
  display:inline-block;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div>ANDRÉ SOUSA</div>
  <div>
    <span class="nav-link" onclick="go('home')">Início</span>
    <span class="nav-link" onclick="go('portfolio')">Portfólio</span>
    <span class="nav-link" onclick="go('contato')">Contato</span>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="hero">
    <h1>Imagem não é detalhe.<br>É posicionamento.</h1>
    <div class="btn" onclick="go('portfolio')">Ver Portfólio</div>
  </div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
  <h2 style="text-align:center;margin:40px;">PORTFÓLIO</h2>

  <div class="portfolio-grid">

    <div class="portfolio-item" onclick="go('negocios')">
      <img src="https://picsum.photos/600?1" class="portfolio-img">
    </div>

    <div class="portfolio-item" onclick="go('ensaios')">
      <img src="https://picsum.photos/600?2" class="portfolio-img">
    </div>

    <div class="portfolio-item" onclick="go('eventos')">
      <img src="https://picsum.photos/600?3" class="portfolio-img">
    </div>

  </div>
</div>

<!-- GALERIA NEGOCIOS -->
<div id="negocios" class="page">
  <h2 style="text-align:center;margin:40px;">NEGÓCIOS</h2>

  <div class="portfolio-grid">
    <img src="https://picsum.photos/600?11" class="portfolio-img" onclick="zoom(this)">
    <img src="https://picsum.photos/600?12" class="portfolio-img" onclick="zoom(this)">
    <img src="https://picsum.photos/600?13" class="portfolio-img" onclick="zoom(this)">
  </div>

  <div class="btn" onclick="go('portfolio')">Voltar</div>
</div>

<!-- ENSAIOS -->
<div id="ensaios" class="page">
  <h2 style="text-align:center;margin:40px;">ENSAIOS</h2>

  <div class="portfolio-grid">
    <img src="https://picsum.photos/600?21" class="portfolio-img" onclick="zoom(this)">
    <img src="https://picsum.photos/600?22" class="portfolio-img" onclick="zoom(this)">
    <img src="https://picsum.photos/600?23" class="portfolio-img" onclick="zoom(this)">
  </div>

  <div class="btn" onclick="go('portfolio')">Voltar</div>
</div>

<!-- EVENTOS -->
<div id="eventos" class="page">
  <h2 style="text-align:center;margin:40px;">EVENTOS</h2>

  <div class="portfolio-grid">
    <img src="https://picsum.photos/600?31" class="portfolio-img" onclick="zoom(this)">
    <img src="https://picsum.photos/600?32" class="portfolio-img" onclick="zoom(this)">
    <img src="https://picsum.photos/600?33" class="portfolio-img" onclick="zoom(this)">
  </div>

  <div class="btn" onclick="go('portfolio')">Voltar</div>
</div>

<!-- CONTATO -->
<div id="contato" class="page">
  <h2 style="text-align:center;margin:40px;">CONTATO</h2>
  <div class="btn" onclick="whats()">Falar no WhatsApp</div>
</div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
  <img id="modal-img">
</div>

<script>
function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

function zoom(img){
  document.getElementById('modal-img').src = img.src;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

function whats(){
  window.open("https://wa.me/55SEUNUMERO");
}
</script>

</body>
</html>
