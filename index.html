<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>André Sousa - Produção Visual</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<style>
body {
  background:#0f0f0f;
  color:#fff;
  font-family: Arial;
}

/* PORTFOLIO */
.portfolio-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

.portfolio-item {
  border:1px solid rgba(212,175,119,0.3);
  padding:40px;
  text-align:center;
  cursor:pointer;
  transition:.3s;
}

.portfolio-item:hover {
  transform:translateY(-5px);
  border-color:#d4af77;
}

/* GALERIA */
#gallery-modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  z-index:9999;
  padding:40px;
  overflow:auto;
}

#gallery-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

#gallery-grid img {
  width:100%;
  border-radius:6px;
}
</style>
</head>

<body>

<h1 style="text-align:center; margin-top:40px;">PORTFÓLIO</h1>

<div class="portfolio-grid">

  <div class="portfolio-item" onclick="openGallery('negocios')">Negócios</div>
  <div class="portfolio-item" onclick="openGallery('ensaios')">Ensaios</div>
  <div class="portfolio-item" onclick="openGallery('eventos')">Eventos</div>
  <div class="portfolio-item" onclick="openGallery('videos')">Vídeos</div>
  <div class="portfolio-item" onclick="openGallery('comerciais')">Comerciais</div>
  <div class="portfolio-item" onclick="openGallery('destaques')">Destaques</div>

</div>

<!-- MODAL -->
<div id="gallery-modal">
  <button onclick="closeGallery()" style="position:absolute; top:20px; right:30px; font-size:30px; background:none; border:none; color:white;">✕</button>

  <h2 id="gallery-title" style="text-align:center; margin-bottom:30px;"></h2>

  <div id="gallery-grid"></div>
</div>

<script>
const galleries = {
  negocios: [
    "https://via.placeholder.com/600x400?text=Negocios+1",
    "https://via.placeholder.com/600x400?text=Negocios+2"
  ],
  ensaios: [
    "https://via.placeholder.com/600x400?text=Ensaios+1",
    "https://via.placeholder.com/600x400?text=Ensaios+2"
  ],
  eventos: [
    "https://via.placeholder.com/600x400?text=Eventos+1"
  ],
  videos: [
    "https://via.placeholder.com/600x400?text=Videos+1"
  ],
  comerciais: [
    "https://via.placeholder.com/600x400?text=Comerciais+1"
  ],
  destaques: [
    "https://via.placeholder.com/600x400?text=Destaques+1"
  ]
};

function openGallery(type){
  const modal = document.getElementById("gallery-modal");
  const grid = document.getElementById("gallery-grid");
  const title = document.getElementById("gallery-title");

  grid.innerHTML="";
  title.innerText = type.toUpperCase();

  galleries[type].forEach(img=>{
    const image = document.createElement("img");
    image.src = img;
    grid.appendChild(image);
  });

  modal.style.display="block";
}

function closeGallery(){
  document.getElementById("gallery-modal").style.display="none";
}
</script>

</body>
</html>
